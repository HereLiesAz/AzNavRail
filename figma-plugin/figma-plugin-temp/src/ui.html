<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AzNavRail UI Kit Generator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background-color: #f5f5f5;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      color: #333;
    }
    p {
      margin: 0;
      font-size: 13px;
      color: #666;
    }
    button {
      background-color: #18A0FB;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #0D8DEB;
    }
    .status {
      font-size: 12px;
      color: #4CAF50;
      display: none;
    }
  </style>
</head>
<body>
  <h2>AzNavRail Generator</h2>
  <p>Click the button below to generate the Compose-based UI kit onto the current page.</p>
  <button id="generate">Generate UI Kit</button>
  <div id="status" class="status">Successfully generated!</div>

  <script>
    document.getElementById('generate').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'generate-ui-kit' } }, '*');
      document.getElementById('status').style.display = 'block';
      setTimeout(() => {
        document.getElementById('status').style.display = 'none';
      }, 3000);
    }
  </script>
</body>
</html>
