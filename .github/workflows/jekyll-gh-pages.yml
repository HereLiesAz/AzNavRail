name: Deploy sample-pwa to GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - "sample-pwa/**"
      - "aznavrail-react/**"
      - ".github/workflows/jekyll-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs but letting in-progress ones finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sample-pwa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Install dependencies for both the React library (file:../aznavrail-react) and the PWA.
      # `npm install` is used instead of `npm ci` because the React library is referenced via a
      # `file:` dependency that mutates the lockfile.
      - name: Install aznavrail-react deps
        working-directory: aznavrail-react
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build aznavrail-react
        working-directory: aznavrail-react
        run: npm run build || echo "library build skipped — source is consumed directly via file: dependency"

      - name: Install sample-pwa deps
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build sample-pwa
        env:
          # GitHub Pages serves the project under /<repo-name>/.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sample-pwa/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
