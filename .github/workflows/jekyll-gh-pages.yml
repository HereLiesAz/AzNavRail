name: Deploy sample-pwa to GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - "sample-pwa/**"
      - "aznavrail-react/**"
      - ".github/workflows/jekyll-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Install the React lib and build its JS/typescript output. `bob build` emits the JS
      # targets reliably; the typescript target is fragile in CI, so we fall back to a direct
      # tsc invocation that force-emits declarations even on pre-existing type errors.
      - name: Install aznavrail-react deps
        working-directory: aznavrail-react
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build aznavrail-react (JS targets)
        working-directory: aznavrail-react
        run: npx bob build || true

      - name: Emit aznavrail-react type declarations
        working-directory: aznavrail-react
        run: |
          node node_modules/typescript/bin/tsc -p tsconfig.build.json \
            --emitDeclarationOnly --noEmitOnError false --skipLibCheck || true
          test -f lib/typescript/index.d.ts

      - name: Install sample-pwa deps
        working-directory: sample-pwa
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build sample-pwa
        working-directory: sample-pwa
        env:
          # GitHub Pages serves the project under /<repo-name>/.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sample-pwa/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
